# Da Infrastructure — CD Workflow
# Runs on: push to main only (after CI passes)
# Does:    deploy dev automatically → deploy prod manually via GitHub environment gate
#
# GitHub Environment setup required (Settings → Environments):
#   "dev"  — no protection rules (auto-deploys)
#   "prod" — Required reviewers: add yourself — this is the manual gate

name: Terraform CD

on:
  workflow_run:
    workflows: ["Terraform CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write
  actions: read   # Required to download artifacts from CI workflow

env:
  TF_VERSION: "1.6.6"
  AWS_REGION: "ap-south-1"
  TF_IN_AUTOMATION: "true"

jobs:

  # ── Deploy dev (automatic on every merge to main) ─────────────────────────
  deploy-dev:
    name: Deploy dev
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: dev
      url: https://api-dev.yourdomain.com   # Update when API Gateway URL is known
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Download the plan artifact produced by CI — apply exactly what was reviewed
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev-${{ github.event.workflow_run.head_sha }}
          path: environment/dev/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Fetch secrets from HCP Vault
        run: |
          HCP_TOKEN=$(curl -s \
            --location "https://auth.idp.hashicorp.com/oauth2/token" \
            --header "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "client_id=${{ secrets.HCP_CLIENT_ID }}" \
            --data-urlencode "client_secret=${{ secrets.HCP_CLIENT_SECRET }}" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "audience=https://api.hashicorp.cloud" \
            | jq -r '.access_token')
          fetch() {
            curl -s \
              --header "Authorization: Bearer ${HCP_TOKEN}" \
              "https://api.cloud.hashicorp.com/secrets/2023-11-28/organizations/${{ secrets.HCP_ORG_ID }}/projects/${{ secrets.HCP_PROJECT_ID }}/apps/da-dev/secrets/${1}:open" \
              | jq -r '.secret.static_version.value'
          }
          echo "TF_VAR_db_password=$(fetch db_password)" >> $GITHUB_ENV
          echo "TF_VAR_jwt_secret_key=$(fetch jwt_secret_key)" >> $GITHUB_ENV
          echo "TF_VAR_stripe_webhook_secret=$(fetch stripe_webhook_secret)" >> $GITHUB_ENV
          echo "TF_VAR_expo_push_token=$(fetch expo_push_token)" >> $GITHUB_ENV
          echo "TF_VAR_lambda_zip_version=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV

      - name: Terraform init
        run: terraform init
        working-directory: environment/dev

      - name: Terraform apply
        run: terraform apply -input=false tfplan.dev
        working-directory: environment/dev

  # ── Deploy prod (manual gate via GitHub Environment protection rules) ──────
  deploy-prod:
    name: Deploy prod
    runs-on: ubuntu-latest
    needs: deploy-dev
    # GitHub Environment "prod" must have Required Reviewers configured.
    # The workflow pauses here until an approver clicks "Approve and deploy".
    # This is the manual gate — equivalent to GitLab's `when: manual`.
    environment:
      name: prod
      url: https://api.yourdomain.com   # Update when API Gateway URL is known
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod-${{ github.event.workflow_run.head_sha }}
          path: environment/prod/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Fetch secrets from HCP Vault
        run: |
          HCP_TOKEN=$(curl -s \
            --location "https://auth.idp.hashicorp.com/oauth2/token" \
            --header "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "client_id=${{ secrets.HCP_CLIENT_ID }}" \
            --data-urlencode "client_secret=${{ secrets.HCP_CLIENT_SECRET }}" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "audience=https://api.hashicorp.cloud" \
            | jq -r '.access_token')
          fetch() {
            curl -s \
              --header "Authorization: Bearer ${HCP_TOKEN}" \
              "https://api.cloud.hashicorp.com/secrets/2023-11-28/organizations/${{ secrets.HCP_ORG_ID }}/projects/${{ secrets.HCP_PROJECT_ID }}/apps/da-prod/secrets/${1}:open" \
              | jq -r '.secret.static_version.value'
          }
          echo "TF_VAR_db_password=$(fetch db_password)" >> $GITHUB_ENV
          echo "TF_VAR_jwt_secret_key=$(fetch jwt_secret_key)" >> $GITHUB_ENV
          echo "TF_VAR_stripe_webhook_secret=$(fetch stripe_webhook_secret)" >> $GITHUB_ENV
          echo "TF_VAR_expo_push_token=$(fetch expo_push_token)" >> $GITHUB_ENV
          echo "TF_VAR_lambda_zip_version=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV

      - name: Terraform init
        run: terraform init
        working-directory: environment/prod

      - name: Terraform apply
        run: terraform apply -input=false tfplan.prod
        working-directory: environment/prod
