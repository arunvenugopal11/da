services:
  postgres:
    image: postgres:16-alpine
    container_name: da-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: datingapp
      POSTGRES_USER: da_admin
      POSTGRES_PASSWORD: devpassword123
    volumes:
      - da-postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U da_admin -d datingapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: da-dynamodb
    restart: unless-stopped
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]

  elasticmq:
    image: softwaremill/elasticmq-native:latest
    container_name: da-elasticmq
    restart: unless-stopped
    ports:
      - "9324:9324"
      - "9325:9325"
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf

volumes:
  da-postgres-data: